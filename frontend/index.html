<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing AI Pro</title>
    <!-- <link rel="stylesheet" href="css/style.css"> -->
    <link rel="stylesheet" href="/static/css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="topbar">
            <div class="brand">
                <span class="brand-icon"><i class="fas fa-bullhorn"></i></span>
                <div class="brand-text">
                    <h1>Marketing AI Pro</h1>
                    <p>Generate multi-channel campaigns in seconds</p>
                </div>
            </div>
        </header>

        <main class="container">
            <section class="input-section">
                <div class="section-head">
                    <h2>Campaign Brief</h2>
                    <p>Describe your offer and we will draft channel-ready copy.</p>
                </div>
                <div class="input-group">
                    <label>Company Name</label>
                    <input type="text" id="company" placeholder="e.g., Cloud Certitude">
                </div>
                <div class="input-group">
                    <label>Campaign Goal</label>
                    <input type="text" id="campaign" placeholder="e.g., Spring Product Launch">
                </div>
                <div class="input-group">
                    <label>Product/Service Description</label>
                    <textarea id="description" rows="4" placeholder="Describe what you are offering..."></textarea>
                </div>
                <button id="generateBtn" onclick="generateMarketing()">
                    <span id="btnText">Generate Strategy</span>
                    <div id="loader" class="spinner" style="display:none;"></div>
                </button>
                <div id="status-message" class="status-message" style="display:none;"></div>
            </section>

            <section class="results-grid">
                <div class="card email-card">
                    <div class="card-header-row">
                        <div class="badge badge-email"><i class="fas fa-envelope"></i> Email Campaign</div>
                        <button class="copy-btn" data-target="email-content" aria-label="Copy email campaign">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                    <div id="email-content" class="content">Drafting will appear here...</div>
                </div>

                <div class="card whatsapp-card">
                    <div class="card-header-row">
                        <div class="badge badge-whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp Blast</div>
                        <button class="copy-btn" data-target="whatsapp-content" aria-label="Copy whatsapp blast">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                    <div id="whatsapp-content" class="content">Messages will appear here...</div>
                </div>

                <div class="card linkedin-card">
                    <div class="card-header-row">
                        <div class="badge badge-linkedin"><i class="fab fa-linkedin-in"></i> LinkedIn Post</div>
                        <button class="copy-btn" data-target="linkedin-content" aria-label="Copy linkedin post">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                    <div id="linkedin-content" class="content">Posts will appear here...</div>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
